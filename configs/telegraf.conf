# =============================================================================
# Telegraf — one-shot metrics collection, appended to a flat log file
# Run via fcron: telegraf --config /etc/cicd/telegraf.conf --once
# =============================================================================

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_jitter = "0s"
  precision = "s"
  quiet = true

# Output: append to a flat TSV-style file (queryable with awk/grep)
[[outputs.file]]
  files = ["/data/metrics/raw/metrics.log"]
  rotation_max_size = "50MB"
  rotation_max_archives = 5
  data_format = "influx"

# CPU
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false

# Memory
[[inputs.mem]]

# Disk
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "overlay"]
  mount_points = ["/", "/data"]

# Disk I/O
[[inputs.diskio]]

# System load
[[inputs.system]]

# Process count
[[inputs.processes]]
